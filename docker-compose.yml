version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: techmaster_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techmaster
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: techmaster_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80" # Truy cập phpMyAdmin ở port 8080
    depends_on:
      - mysql

volumes:
  db_data: